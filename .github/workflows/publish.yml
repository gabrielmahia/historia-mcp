name: Publish to PyPI
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine upload dist/* --username __token__ --password ${{ secrets.PYPI_API_TOKEN }} --non-interactive --skip-existing
